<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SplitMate — Test Suite</title>
<style>
  :root {
    --pass: #047857; --fail: #dc2626; --skip: #d97706;
    --bg: #f0fdf4; --surface: #fff; --border: #d1fae5;
    --text: #0a1a14; --text-2: #3d5a4f; --text-3: #6b7280;
    --primary: rgb(4,120,87);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 24px; }
  h1 { font-size: 1.5rem; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
  .subtitle { font-size: 0.88rem; color: var(--text-3); margin-bottom: 24px; }
  .summary-bar {
    display: flex; gap: 16px; flex-wrap: wrap;
    background: var(--surface); border-radius: 12px; padding: 14px 20px;
    border: 1px solid var(--border); margin-bottom: 20px;
    box-shadow: 0 1px 4px rgba(4,120,87,0.08);
  }
  .summary-item { display: flex; align-items: center; gap: 6px; font-size: 0.88rem; font-weight: 600; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-pass { background: var(--pass); }
  .dot-fail { background: var(--fail); }
  .dot-skip { background: var(--skip); }
  .progress-bar { height: 6px; background: #e5e7eb; border-radius: 100px; overflow: hidden; margin-bottom: 20px; }
  .progress-fill { height: 100%; background: var(--primary); border-radius: 100px; transition: width 0.5s ease; }
  .suite { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); margin-bottom: 14px; overflow: hidden; box-shadow: 0 1px 4px rgba(4,120,87,0.06); }
  .suite-header { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
  .suite-name { font-weight: 700; font-size: 0.95rem; display: flex; align-items: center; gap: 8px; }
  .suite-meta { font-size: 0.78rem; color: var(--text-3); }
  .suite-body { border-top: 1px solid var(--border); }
  .test-row { padding: 9px 16px 9px 40px; border-bottom: 1px solid #f3f4f6; display: flex; align-items: flex-start; gap: 10px; }
  .test-row:last-child { border-bottom: none; }
  .test-icon { font-size: 0.8rem; flex-shrink: 0; margin-top: 1px; }
  .test-name { font-size: 0.85rem; color: var(--text); flex: 1; }
  .test-detail { font-size: 0.75rem; color: var(--text-3); margin-top: 2px; }
  .test-pass .test-name { color: var(--pass); }
  .test-fail .test-name { color: var(--fail); }
  .test-skip .test-name { color: var(--skip); }
  .error-msg { font-size: 0.75rem; color: var(--fail); background: #fef2f2; padding: 4px 8px; border-radius: 4px; margin-top: 4px; font-family: monospace; }
  .run-btn { background: var(--primary); color: white; border: none; padding: 10px 24px; border-radius: 100px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .run-btn:hover { background: #065f46; }
  .run-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .actions { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .btn-outline { background: white; color: var(--primary); border: 1.5px solid var(--border); padding: 9px 18px; border-radius: 100px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-outline:hover { border-color: var(--primary); background: #f0fdf4; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .badge { padding: 2px 8px; border-radius: 100px; font-size: 0.7rem; font-weight: 700; }
  .badge-pass { background: #d1fae5; color: var(--pass); }
  .badge-fail { background: #fee2e2; color: var(--fail); }
  .badge-pending { background: #f3f4f6; color: var(--text-3); }
  .timestamp { font-size: 0.75rem; color: var(--text-3); margin-top: 8px; }
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<h1>🧪 SplitMate Test Suite</h1>
<p class="subtitle">Automated tests for all 11 phases · HTML/CSS/JS + PHP/MySQL</p>

<div class="actions">
  <button class="run-btn" id="run-all-btn" onclick="runAll()">▶ Run All Tests</button>
  <button class="btn-outline" onclick="runSuite('phase1')">Phase 1–2</button>
  <button class="btn-outline" onclick="runSuite('phase3')">Phase 3–4</button>
  <button class="btn-outline" onclick="runSuite('phase5')">Phase 5–6</button>
  <button class="btn-outline" onclick="runSuite('phase7')">Phase 7–8</button>
  <button class="btn-outline" onclick="runSuite('phase9')">Phase 9–11</button>
  <button class="btn-outline" onclick="clearResults()">↺ Reset</button>
</div>

<div class="summary-bar" id="summary">
  <div class="summary-item"><div class="dot dot-pass"></div><span id="pass-count">0 passed</span></div>
  <div class="summary-item"><div class="dot dot-fail"></div><span id="fail-count">0 failed</span></div>
  <div class="summary-item"><div class="dot dot-skip"></div><span id="skip-count">0 skipped</span></div>
  <div class="summary-item" style="margin-left:auto;color:var(--text-3)" id="total-count">0 total</div>
</div>

<div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>

<div id="test-output"></div>
<div class="timestamp" id="run-time"></div>

<script>
// ============================================================
// TEST FRAMEWORK
// ============================================================
const results = { pass: 0, fail: 0, skip: 0, total: 0 };

function assert(condition, msg) {
  if (!condition) throw new Error(msg || 'Assertion failed');
}

function assertEqual(a, b, msg) {
  if (a !== b) throw new Error(msg || `Expected "${b}", got "${a}"`);
}

function assertContains(str, substr, msg) {
  if (!String(str).includes(substr)) throw new Error(msg || `"${str}" does not contain "${substr}"`);
}

function assertNotNull(val, msg) {
  if (val === null || val === undefined) throw new Error(msg || 'Expected non-null value');
}

function assertArray(val, msg) {
  if (!Array.isArray(val)) throw new Error(msg || `Expected array, got ${typeof val}`);
}

function assertRange(val, min, max, msg) {
  if (val < min || val > max) throw new Error(msg || `${val} not in range [${min}, ${max}]`);
}

// ============================================================
// TEST SUITES DEFINITION
// ============================================================
const SUITES = {
  phase1: {
    name: '📦 Phase 1 & 2 — Landing Page & PWA Shell',
    tests: [
      {
        name: 'Landing page renders in browser (non-PWA)',
        detail: 'Screen with id "landing-screen" should be visible when not in standalone mode',
        fn: () => {
          const el = document.getElementById('landing-screen');
          assert(el !== null, 'landing-screen element missing');
          // In test context simulate browser mode
          const isVisible = !window.matchMedia('(display-mode: standalone)').matches;
          assert(true, 'Landing screen exists');
        }
      },
      {
        name: 'Install button exists and has click handler',
        detail: 'Button#install-btn should exist and call triggerInstall()',
        fn: () => {
          const btn = document.getElementById('install-btn');
          assertNotNull(btn, 'install-btn not found');
          assertContains(btn.getAttribute('onclick') || btn.outerHTML, 'triggerInstall', 'No triggerInstall handler');
        }
      },
      {
        name: 'PWA manifest.json link is declared',
        detail: '<link rel="manifest"> should exist in <head>',
        fn: () => {
          const link = document.querySelector('link[rel="manifest"]');
          assertNotNull(link, 'manifest link missing');
          assertContains(link.href || link.getAttribute('href'), 'manifest', 'manifest href invalid');
        }
      },
      {
        name: 'Meta theme-color matches primary brand color',
        detail: 'theme-color should be rgb(4, 120, 87)',
        fn: () => {
          const meta = document.querySelector('meta[name="theme-color"]');
          assertNotNull(meta, 'theme-color meta missing');
          assertContains(meta.content, '4, 120, 87', 'Wrong theme color');
        }
      },
      {
        name: 'apple-mobile-web-app-capable meta exists',
        detail: 'Required for iOS PWA installation',
        fn: () => {
          const meta = document.querySelector('meta[name="apple-mobile-web-app-capable"]');
          assertNotNull(meta, 'apple-mobile-web-app-capable missing');
          assertEqual(meta.content, 'yes', 'Should be "yes"');
        }
      },
      {
        name: 'SplitMate logo SVG renders correctly',
        detail: 'SVG logo should have correct viewBox and fill color',
        fn: () => {
          const svgs = document.querySelectorAll('svg');
          assert(svgs.length > 0, 'No SVGs found');
          let hasBrandColor = false;
          svgs.forEach(svg => {
            if (svg.innerHTML.includes('4,120,87') || svg.innerHTML.includes('4, 120, 87')) hasBrandColor = true;
          });
          assert(hasBrandColor, 'No SVG uses brand color rgb(4,120,87)');
        }
      },
      {
        name: 'Loading screen has animation elements',
        detail: 'loading-screen should have loading-bar for animated progress',
        fn: () => {
          const screen = document.getElementById('loading-screen');
          assertNotNull(screen, 'loading-screen missing');
          const bar = screen.querySelector('.loading-bar');
          assertNotNull(bar, '.loading-bar missing inside loading-screen');
        }
      },
      {
        name: 'Feature cards are rendered (min 6)',
        detail: 'Landing page should show at least 6 feature cards',
        fn: () => {
          const cards = document.querySelectorAll('.feature-card');
          assert(cards.length >= 6, `Only ${cards.length} feature cards, need >= 6`);
        }
      },
      {
        name: 'All screens exist in DOM',
        detail: 'All required screen IDs should be present',
        fn: () => {
          const required = ['landing-screen','loading-screen','signin-screen','signup-screen','dashboard-screen','profile-screen','trip-screen'];
          required.forEach(id => {
            assertNotNull(document.getElementById(id), `Missing screen: #${id}`);
          });
        }
      },
      {
        name: 'CSS custom properties (design tokens) defined',
        detail: '--primary, --surface, --radius-md etc should be set on :root',
        fn: () => {
          const styles = getComputedStyle(document.documentElement);
          const primary = styles.getPropertyValue('--primary').trim();
          assert(primary.length > 0, '--primary CSS variable not set');
          const font = styles.getPropertyValue('--font').trim();
          assert(font.length > 0, '--font CSS variable not set');
        }
      },
    ]
  },

  phase3: {
    name: '🔐 Phase 3 & 4 — Sign In, Sign Up & Auth',
    tests: [
      {
        name: 'Sign-in form has email and password fields',
        fn: () => {
          assertNotNull(document.getElementById('signin-email'), 'signin-email missing');
          assertNotNull(document.getElementById('signin-password'), 'signin-password missing');
        }
      },
      {
        name: 'Sign-in validates empty fields',
        detail: 'handleSignIn should reject empty form and call showToast',
        fn: () => {
          document.getElementById('signin-email').value = '';
          document.getElementById('signin-password').value = '';
          let toastShown = false;
          const origToast = window.showToast;
          window.showToast = (msg) => { toastShown = true; };
          const fakeBtn = { classList: { toggle: () => {} }, disabled: false };
          handleSignIn(fakeBtn);
          window.showToast = origToast;
          assert(toastShown, 'showToast not called for empty form');
        }
      },
      {
        name: 'Password toggle button exists in sign-in',
        fn: () => {
          const screen = document.getElementById('signin-screen');
          const toggle = screen.querySelector('.input-icon-btn');
          assertNotNull(toggle, 'Password toggle button missing');
          assertContains(toggle.getAttribute('onclick'), 'togglePwd', 'togglePwd not in onclick');
        }
      },
      {
        name: 'togglePwd changes input type',
        detail: 'togglePwd("signin-password", btn) should toggle type between password and text',
        fn: () => {
          const input = document.getElementById('signin-password');
          input.type = 'password';
          const fakeBtn = { textContent: '👁' };
          togglePwd('signin-password', fakeBtn);
          assertEqual(input.type, 'text', 'Should switch to text');
          togglePwd('signin-password', fakeBtn);
          assertEqual(input.type, 'password', 'Should switch back to password');
        }
      },
      {
        name: 'Forgot password link exists',
        fn: () => {
          const link = document.querySelector('.forgot-link');
          assertNotNull(link, '.forgot-link button missing');
          assertContains(link.getAttribute('onclick'), 'forgot-modal', 'Should open forgot-modal');
        }
      },
      {
        name: 'Forgot password modal exists with correct content',
        fn: () => {
          const modal = document.getElementById('forgot-modal');
          assertNotNull(modal, 'forgot-modal missing');
          assertContains(modal.textContent, 'password', 'Modal should mention password');
          assertContains(modal.textContent, 'email', 'Modal should mention email');
        }
      },
      {
        name: 'Sign-up has all required fields',
        detail: 'Full Name, Email, Password',
        fn: () => {
          assertNotNull(document.getElementById('signup-name'), 'signup-name missing');
          assertNotNull(document.getElementById('signup-email'), 'signup-email missing');
          assertNotNull(document.getElementById('signup-password'), 'signup-password missing');
        }
      },
      {
        name: 'Sign-up validates password length (min 8)',
        fn: () => {
          document.getElementById('signup-name').value = 'Test User';
          document.getElementById('signup-email').value = 'test@example.com';
          document.getElementById('signup-password').value = 'short';
          let msg = '';
          const orig = window.showToast;
          window.showToast = (m) => { msg = m; };
          const fakeBtn = { classList: { toggle: () => {} }, disabled: false };
          handleSignUp(fakeBtn);
          window.showToast = orig;
          assertContains(msg, '8', 'Should warn about 8 char minimum');
        }
      },
      {
        name: 'Email verification modal exists',
        fn: () => {
          const modal = document.getElementById('verify-email-modal');
          assertNotNull(modal, 'verify-email-modal missing');
          assertContains(modal.textContent, 'email', 'Should mention email');
        }
      },
      {
        name: 'New password screen has confirm password field',
        fn: () => {
          assertNotNull(document.getElementById('new-pwd'), 'new-pwd field missing');
          assertNotNull(document.getElementById('confirm-pwd'), 'confirm-pwd field missing');
        }
      },
      {
        name: 'New password validates mismatch',
        fn: () => {
          document.getElementById('new-pwd').value = 'password123';
          document.getElementById('confirm-pwd').value = 'different456';
          let msg = '';
          const orig = window.showToast;
          window.showToast = (m) => { msg = m; };
          const fakeBtn = { classList: { toggle: () => {} }, disabled: false };
          handleNewPassword(fakeBtn);
          window.showToast = orig;
          assertContains(msg.toLowerCase(), 'match', 'Should warn passwords do not match');
        }
      },
      {
        name: 'Google auth button exists on both screens',
        fn: () => {
          const googleBtns = document.querySelectorAll('.btn-google');
          assert(googleBtns.length >= 2, `Only ${googleBtns.length} Google buttons, need >= 2`);
        }
      },
      {
        name: 'Session is saved to localStorage after login',
        fn: () => {
          localStorage.removeItem('sm_user');
          AppState.currentUser = { name: 'Test', email: 'test@t.com', initials: 'T' };
          saveSession(AppState.currentUser);
          const saved = localStorage.getItem('sm_user');
          assertNotNull(saved, 'sm_user not saved to localStorage');
          const parsed = JSON.parse(saved);
          assertEqual(parsed.email, 'test@t.com', 'Wrong email in session');
          localStorage.removeItem('sm_user');
        }
      },
      {
        name: 'loadSession returns null when no session',
        fn: () => {
          localStorage.removeItem('sm_user');
          const result = loadSession();
          assert(result === null, 'loadSession should return null when no session');
        }
      },
      {
        name: 'clearSession removes localStorage key',
        fn: () => {
          localStorage.setItem('sm_user', '{"name":"test"}');
          clearSession();
          assert(!localStorage.getItem('sm_user'), 'sm_user should be removed');
        }
      },
    ]
  },

  phase5: {
    name: '🗺️ Phase 5 & 6 — Dashboard & Profile',
    tests: [
      {
        name: 'Dashboard renders trip list correctly',
        fn: () => {
          AppState.trips = [...SAMPLE_TRIPS];
          AppState.currentPage = 1;
          AppState.currentUser = DEMO_USER;
          renderTrips();
          const list = document.getElementById('trips-list');
          assert(list.children.length > 0, 'trips-list should have children after render');
        }
      },
      {
        name: 'Trips show correct status badges',
        fn: () => {
          AppState.trips = [...SAMPLE_TRIPS];
          renderTrips();
          const badges = document.querySelectorAll('#trips-list .status-badge');
          assert(badges.length > 0, 'No status badges found');
          let hasActive = false;
          badges.forEach(b => { if (b.classList.contains('status-active')) hasActive = true; });
          assert(hasActive, 'No active status badge found');
        }
      },
      {
        name: 'Trip count label updates correctly',
        fn: () => {
          AppState.trips = [...SAMPLE_TRIPS];
          renderTrips();
          const label = document.getElementById('trip-count-label');
          assertContains(label.textContent, '5', 'Should show 5 trips');
        }
      },
      {
        name: 'Pagination renders for > pageSize trips',
        fn: () => {
          AppState.trips = Array.from({length: 25}, (_, i) => ({
            ...SAMPLE_TRIPS[0], id: `T${i}`, name: `Trip ${i}`
          }));
          AppState.currentPage = 1;
          AppState.pageSize = 20;
          renderTrips();
          const pagEl = document.getElementById('trips-pagination');
          assert(pagEl.children.length >= 2, 'Should have at least 2 page buttons');
          AppState.trips = [...SAMPLE_TRIPS];
          renderTrips();
        }
      },
      {
        name: 'Dashboard header is sticky',
        fn: () => {
          const header = document.querySelector('#dashboard-screen .app-header');
          assertNotNull(header, 'Dashboard app-header missing');
          const pos = getComputedStyle(header).position;
          assertEqual(pos, 'sticky', 'Header should be position: sticky');
        }
      },
      {
        name: 'Avatar button exists and navigates to profile',
        fn: () => {
          const btn = document.getElementById('dashboard-avatar');
          assertNotNull(btn, 'dashboard-avatar missing');
          assertContains(btn.getAttribute('onclick'), 'profile-screen', 'Should show profile-screen');
        }
      },
      {
        name: 'Empty state shown when no trips',
        fn: () => {
          AppState.trips = [];
          renderTrips();
          const list = document.getElementById('trips-list');
          assertContains(list.innerHTML, 'empty-state', 'empty-state class missing');
          AppState.trips = [...SAMPLE_TRIPS];
          renderTrips();
        }
      },
      {
        name: 'FAB buttons exist on dashboard',
        fn: () => {
          const fabs = document.querySelectorAll('#dashboard-screen .fab');
          assert(fabs.length >= 2, `Need at least 2 FABs, found ${fabs.length}`);
        }
      },
      {
        name: 'Profile avatar upload trigger works',
        fn: () => {
          const input = document.getElementById('avatar-input');
          assertNotNull(input, 'avatar-input missing');
          assertEqual(input.type, 'file', 'Should be file input');
          assertContains(input.accept, 'image', 'Should accept images');
        }
      },
      {
        name: 'Profile screen shows all fields',
        fn: () => {
          assertNotNull(document.getElementById('profile-name-display'), 'profile-name-display missing');
          assertNotNull(document.getElementById('profile-email-display'), 'profile-email-display missing');
          assertNotNull(document.getElementById('profile-row-upi'), 'profile-row-upi missing');
          assertNotNull(document.getElementById('profile-row-qr'), 'profile-row-qr missing');
        }
      },
      {
        name: 'Edit field modal updates user name',
        fn: () => {
          AppState.currentUser = { ...DEMO_USER };
          AppState.editingField = 'name';
          document.getElementById('edit-field-input').value = 'New Name';
          saveEditField();
          assertEqual(AppState.currentUser.name, 'New Name', 'Name should update');
          AppState.currentUser = { ...DEMO_USER };
        }
      },
      {
        name: 'Edit field modal updates UPI ID',
        fn: () => {
          AppState.currentUser = { ...DEMO_USER };
          AppState.editingField = 'upi';
          document.getElementById('edit-field-input').value = 'test@upi';
          saveEditField();
          assertEqual(AppState.currentUser.upi, 'test@upi', 'UPI should update');
          AppState.currentUser = { ...DEMO_USER };
        }
      },
      {
        name: 'Logout modal exists with confirmation buttons',
        fn: () => {
          const modal = document.getElementById('logout-modal');
          assertNotNull(modal, 'logout-modal missing');
          const btns = modal.querySelectorAll('button');
          assert(btns.length >= 2, 'Need at least 2 buttons in logout modal');
        }
      },
      {
        name: 'Logout clears session and returns to signin',
        fn: () => {
          saveSession({ name: 'Test', email: 't@t.com' });
          let navTarget = '';
          const orig = window.showScreen;
          window.showScreen = (s) => { navTarget = s; orig(s); };
          handleLogout();
          window.showScreen = orig;
          assert(!localStorage.getItem('sm_user'), 'Session not cleared');
        }
      },
    ]
  },

  phase7: {
    name: '✈️ Phase 7 & 8 — Create & Join Trips',
    tests: [
      {
        name: 'Add trip modal exists with name and description fields',
        fn: () => {
          const modal = document.getElementById('add-trip-modal');
          assertNotNull(modal, 'add-trip-modal missing');
          assertNotNull(document.getElementById('new-trip-name'), 'new-trip-name missing');
          assertNotNull(document.getElementById('new-trip-desc'), 'new-trip-desc missing');
        }
      },
      {
        name: 'createTrip validates empty name',
        fn: () => {
          document.getElementById('new-trip-name').value = '';
          let msg = '';
          const orig = window.showToast;
          window.showToast = (m) => { msg = m; };
          createTrip();
          window.showToast = orig;
          assert(msg.length > 0, 'Should show error for empty name');
        }
      },
      {
        name: 'createTrip generates unique 6-char join code',
        fn: () => {
          const initialCount = AppState.trips.length;
          document.getElementById('new-trip-name').value = 'Test Trip Alpha';
          document.getElementById('new-trip-desc').value = 'Test';
          createTrip();
          assertEqual(AppState.trips.length, initialCount + 1, 'Trip count should increase');
          const newTrip = AppState.trips[0];
          assert(newTrip.id.length >= 6, 'Join code should be >= 6 chars');
          // Cleanup
          AppState.trips = [...SAMPLE_TRIPS];
        }
      },
      {
        name: 'Trip share modal shows code and URL',
        fn: () => {
          const modal = document.getElementById('trip-share-modal');
          assertNotNull(modal, 'trip-share-modal missing');
          assertNotNull(document.getElementById('share-code'), 'share-code element missing');
          assertNotNull(document.getElementById('share-url'), 'share-url element missing');
        }
      },
      {
        name: 'Share URL contains join code',
        fn: () => {
          document.getElementById('share-code').textContent = 'ABCDEF';
          document.getElementById('share-url').textContent = 'https://splitmate.app/join/ABCDEF';
          assertContains(document.getElementById('share-url').textContent, 'ABCDEF', 'URL should contain code');
        }
      },
      {
        name: 'Copy button exists for both code and URL',
        fn: () => {
          const modal = document.getElementById('trip-share-modal');
          const copyBtns = modal.querySelectorAll('.copy-btn');
          assert(copyBtns.length >= 2, `Need >= 2 copy buttons, found ${copyBtns.length}`);
        }
      },
      {
        name: 'Join trip modal exists with code input',
        fn: () => {
          const modal = document.getElementById('join-trip-modal');
          assertNotNull(modal, 'join-trip-modal missing');
          const input = document.getElementById('join-code-input');
          assertNotNull(input, 'join-code-input missing');
          assertEqual(input.maxLength, 6, 'Code input maxlength should be 6');
        }
      },
      {

// ============================================================
// TEST RUNNER
// ============================================================
let isRunning = false;
let startTime = null;

async function runAll() {
  if (isRunning) return;
  clearResults();
  isRunning = true;
  startTime = Date.now();
  document.getElementById('run-all-btn').disabled = true;
  document.getElementById('run-all-btn').innerHTML = '<span class="spinner"></span>Running…';
  for (const suiteKey of Object.keys(SUITES)) {
    await runSuite(suiteKey, true);
    await sleep(50);
  }
  document.getElementById('run-all-btn').disabled = false;
  document.getElementById('run-all-btn').innerHTML = '▶ Run All Tests';
  isRunning = false;
  const elapsed = ((Date.now() - startTime) / 1000).toFixed(2);
  document.getElementById('run-time').textContent = `Completed in ${elapsed}s · ${new Date().toLocaleTimeString()}`;
}

async function runSuite(suiteKey, accumulate = false) {
  const suite = SUITES[suiteKey];
  if (!suite) return;
  if (!accumulate) { clearResults(); startTime = Date.now(); }

  const container = document.getElementById('test-output');
  const existing = document.getElementById(`suite-${suiteKey}`);
  if (existing) existing.remove();

  const suiteEl = document.createElement('div');
  suiteEl.className = 'suite';
  suiteEl.id = `suite-${suiteKey}`;

  const header = document.createElement('div');
  header.className = 'suite-header';
  header.innerHTML = `<div class="suite-name">${suite.name} <span class="badge badge-pending" id="badge-${suiteKey}">Running…</span></div><div class="suite-meta" id="meta-${suiteKey}"></div>`;
  header.onclick = () => { body.style.display = body.style.display === 'none' ? '' : 'none'; };

  const body = document.createElement('div');
  body.className = 'suite-body';
  suiteEl.appendChild(header);
  suiteEl.appendChild(body);
  container.appendChild(suiteEl);

  let pass = 0, fail = 0, skip = 0;

  for (const test of suite.tests) {
    const row = document.createElement('div');
    row.className = 'test-row';
    body.appendChild(row);
    await sleep(20);

    try {
      await Promise.resolve(test.fn());
      pass++;
      results.pass++;
      row.className = 'test-row test-pass';
      row.innerHTML = `<span class="test-icon">✅</span><div><div class="test-name">${test.name}</div>${test.detail ? `<div class="test-detail">${test.detail}</div>` : ''}</div>`;
    } catch (err) {
      fail++;
      results.fail++;
      row.className = 'test-row test-fail';
      row.innerHTML = `<span class="test-icon">❌</span><div><div class="test-name">${test.name}</div>${test.detail ? `<div class="test-detail">${test.detail}</div>` : ''}<div class="error-msg">${escapeHtml(err.message)}</div></div>`;
    }

    results.total++;
    updateSummary();
  }

  const badge = document.getElementById(`badge-${suiteKey}`);
  const meta = document.getElementById(`meta-${suiteKey}`);
  badge.className = `badge ${fail === 0 ? 'badge-pass' : 'badge-fail'}`;
  badge.textContent = fail === 0 ? `All ${pass} passed` : `${fail} failed`;
  meta.textContent = `${pass}/${pass + fail} passed`;
}

function updateSummary() {
  document.getElementById('pass-count').textContent = `${results.pass} passed`;
  document.getElementById('fail-count').textContent = `${results.fail} failed`;
  document.getElementById('skip-count').textContent = `${results.skip} skipped`;
  document.getElementById('total-count').textContent = `${results.total} total`;
  const pct = results.total > 0 ? (results.pass / results.total) * 100 : 0;
  document.getElementById('progress').style.width = pct + '%';
  document.getElementById('progress').style.background = results.fail > 0 ? 'linear-gradient(90deg, var(--pass) 0%, #f59e0b 100%)' : 'var(--primary)';
}

function clearResults() {
  results.pass = 0; results.fail = 0; results.skip = 0; results.total = 0;
  document.getElementById('test-output').innerHTML = '';
  document.getElementById('run-time').textContent = '';
  updateSummary();
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Load index.html app functions into this page context via iframe bridge
// Since we're in a different file, the tests reference functions from the app window.
// In actual deployment, both files are served from same origin and tests reference the app window.
// Here we check if core functions exist and mark as available.
window.addEventListener('DOMContentLoaded', () => {
  // Check if running standalone (linked to app) or as test file
  const needed = ['showToast','showModal','hideModal','showScreen','saveSession','loadSession','clearSession'];
  const missing = needed.filter(fn => typeof window[fn] !== 'function');
  if (missing.length > 0) {
    document.getElementById('test-output').innerHTML = `
      <div class="suite">
        <div class="suite-header">
          <div class="suite-name">⚠️ Setup Notice</div>
        </div>
        <div class="suite-body">
          <div class="test-row">
            <span class="test-icon">ℹ️</span>
            <div>
              <div class="test-name">Test runner loaded as standalone file</div>
              <div class="test-detail">To run full tests: open index.html, then navigate to tests.html in the same tab context, or embed this via &lt;script&gt; in index.html. Missing functions: ${missing.join(', ')}</div>
              <div class="test-detail" style="margin-top:6px;color:var(--pass)">✓ Structural & logic tests will run. DOM tests require app context.</div>
            </div>
          </div>
        </div>
      </div>`;
  }
});
